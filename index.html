<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti Praktis Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { 
            margin: 0; padding: 20px; font-family: Arial, sans-serif; 
            background-color: #131722; color: white; text-align: center; 
        }
        #chart { width: 100%; height: 350px; margin-bottom: 10px; }
        #pnl-display { font-size: 20px; font-weight: bold; margin-bottom: 15px; height: 24px; }
        
        .btn-container { display: flex; gap: 10px; width: 100%; }
        button { 
            padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; 
            border: none; cursor: pointer; color: white; width: 100%;
        }
        .btn-buy { background-color: #26a69a; }
        .btn-sell { background-color: #ef5350; }
        .btn-close { background-color: #ff9800; display: none; }
    </style>
</head>
<body>

    <h2 id="welcome-text">Arena Trading</h2>
    <div id="chart"></div>
    <div id="pnl-display"></div>
    
    <div class="btn-container" id="action-buttons">
        <button class="btn-buy" onclick="openTrade('BUY')">BUY</button>
        <button class="btn-sell" onclick="openTrade('SELL')">SELL</button>
    </div>
    
    <button class="btn-close" id="close-btn" onclick="closeTrade()">CLOSE TRADE</button>

    <script>
        // ========================================================
        // PENTING: Ganti dengan Token dan Chat ID milik Anda sendiri!
        // ========================================================
        const BOT_TOKEN = "8776331759:AAFVup_qefWDme_yz7PYUvzDcXJNlJ70yLU";
        const CHAT_ID = "-1003742641612"; 
        // ========================================================

        // Inisialisasi Telegram SDK untuk mengambil data User
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        // Ambil nama depan user Telegram, jika di browser gunakan nama "Trader"
        const userName = tg.initDataUnsafe?.user?.first_name || "Trader Lokal";
        document.getElementById('welcome-text').innerText = "Halo, " + userName;

        let isTrading = false;
        let entryPrice = 0;
        let tradeDirection = '';

        // Setup Grafik
        const chartElement = document.getElementById('chart');
        const chart = LightweightCharts.createChart(chartElement, { 
            width: chartElement.clientWidth, 
            height: 350,
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#363c4e' }, horzLines: { color: '#363c4e' } },
            timeScale: { timeVisible: true }
        });
        const candleSeries = chart.addCandlestickSeries();

        // Riwayat Harga Masa Lalu
        let currentPrice = 2350.00; 
        let currentTime = Math.floor(Date.now() / 1000) - (60 * 50); 
        const historyData = [];

        for(let i = 0; i < 50; i++) {
            let open = currentPrice;
            let close = open + ((Math.random() - 0.5) * 4);
            let high = Math.max(open, close) + (Math.random() * 2);
            let low = Math.min(open, close) - (Math.random() * 2);
            
            historyData.push({ 
                time: currentTime, 
                open: parseFloat(open.toFixed(2)), 
                high: parseFloat(high.toFixed(2)), 
                low: parseFloat(low.toFixed(2)), 
                close: parseFloat(close.toFixed(2)) 
            });
            currentPrice = close;
            currentTime += 60; 
        }
        candleSeries.setData(historyData);
        chart.timeScale().fitContent();

        // Mesin Simulasi Live
        setInterval(() => {
            currentTime += 60; 
            let open = currentPrice;
            let close = open + ((Math.random() - 0.5) * 4);
            let high = Math.max(open, close) + (Math.random() * 2);
            let low = Math.min(open, close) - (Math.random() * 2);

            candleSeries.update({
                time: currentTime, 
                open: parseFloat(open.toFixed(2)), 
                high: parseFloat(high.toFixed(2)), 
                low: parseFloat(low.toFixed(2)), 
                close: parseFloat(close.toFixed(2))
            });
            currentPrice = close; 

            if (isTrading) {
                let pnl = tradeDirection === 'BUY' ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
                let pnlEl = document.getElementById('pnl-display');
                pnlEl.innerText = `Floating PnL: $${pnl.toFixed(2)}`;
                pnlEl.style.color = pnl >= 0 ? '#26a69a' : '#ef5350';
            }
        }, 1000);

        function openTrade(direction) {
            isTrading = true;
            tradeDirection = direction;
            entryPrice = currentPrice;
            
            document.getElementById('action-buttons').style.display = 'none';
            document.getElementById('close-btn').style.display = 'block';
            document.getElementById('pnl-display').innerText = "Floating PnL: $0.00";
        }

        function closeTrade() {
            isTrading = false;
            let finalPnl = tradeDirection === 'BUY' ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
            
            document.getElementById('action-buttons').style.display = 'flex';
            document.getElementById('close-btn').style.display = 'none';
            document.getElementById('pnl-display').innerText = ""; 
            
            let status = finalPnl >= 0 ? "WIN ✅" : "LOSS ❌";

            // Tampilkan alert lokal di HP/Browser
            alert(`Trade Selesai!\nStatus: ${status}\nTotal PnL: $${finalPnl.toFixed(2)}`);

            // PANGGIL FUNGSI KIRIM DATA KE CHANNEL
            kirimLogKeChannel(userName, tradeDirection, status, finalPnl.toFixed(2));
        }

        // FUNGSI UTAMA DATABASE (Kirim Data via Telegram API)
        function kirimLogKeChannel(player, posisi, hasil, pnl) {
            // Susun teks pesan semenarik mungkin untuk papan skor
            const pesan = `📊 *ANTI PRAKTIS ARENA LOG*\n\n` +
                          `👤 Trader: *${player}*\n` +
                          `🚀 Posisi: *${posisi}*\n` +
                          `🎯 Hasil: *${hasil}*\n` +
                          `💰 Total PnL: *$${pnl}*\n\n` +
                          `_Data otomatis tersimpan di serverless database_`;

            // Kirim data menggunakan metode fetch POST bawaan JavaScript
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: pesan,
                    parse_mode: "Markdown" // Agar teks tebal (*) dan miring (_) bisa terbaca rapi
                })
            })
            .then(response => console.log("Data berhasil dikirim ke database Channel!"))
            .catch(error => console.error("Gagal mengirim data:", error));
        }
    </script>
</body>
</html>
