<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti Praktis Arena - XAU & BTC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { margin: 0; background-color: #1c1c1c; color: white; font-family: sans-serif; text-align: center; }
        #tradingview_widget { height: 350px; display: none; }
        .panel { padding: 15px; background: #2b2b2b; display: none; }
        .btn-container { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-sell { background: #d32f2f; }
        .btn-buy { background: #1976d2; }
        .btn-close { background: #ff9800; display: none; width: 100%; }
        #display-price { font-size: 20px; color: #fb8c00; margin-bottom: 10px; font-weight: bold; }
        #loading-screen { padding: 50px 20px; font-size: 18px; color: #b2b5be; }
    </style>
</head>
<body>

    <div id="loading-screen">Menyambungkan ke Server Admin... 🔄</div>

    <div id="tradingview_widget"></div>

    <div class="panel" id="main-panel">
        <h3 id="display-price">Menganalisis Pasar...</h3>
        
        <div class="btn-container" id="trade-ui">
            <button class="btn-sell" onclick="executeTrade('SELL')">SELL</button>
            <button class="btn-buy" onclick="executeTrade('BUY')">BUY</button>
        </div>
        <button id="close-btn" class="btn-close" onclick="closeTrade()">CLOSE POSITION</button>
    </div>

    <script>
        // ========================================================
        // KONFIGURASI OTOMATIS TERPASANG
        // ========================================================
        const LINK_CSV_GOOGLE_SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSe5vVYhDuO_XWUx0Nol67I_89VlEl2YIUW797yYqiksP5X1jsONaJVEoXhtzcfNrG7iVmiC9EWR50S/pub?output=csv";
        const BOT_TOKEN = "8776331759:AAFVup_qefWDme_yz7PYUvzDcXJNlJ70yLU";
        const CHAT_ID = "-1003742641612";
        // ========================================================

        const tg = window.Telegram.WebApp;
        tg.ready();
        const userName = tg.initDataUnsafe?.user?.first_name || "Trader";

        let currentPrice = 0;
        let isTrading = false;
        let activeSymbol = "BINANCE:BTCUSDT"; 

        async function fetchAdminSettings() {
            try {
                const response = await fetch(LINK_CSV_GOOGLE_SHEET + "&t=" + new Date().getTime());
                const data = await response.text();
                
                const rows = data.split('\n');
                const config = {};
                rows.forEach(row => {
                    const columns = row.split(',');
                    if(columns.length >= 2) config[columns[0].trim()] = columns[1].trim();
                });

                validateGame(config);
            } catch (error) {
                document.getElementById('loading-screen').innerHTML = "Gagal mengambil data dari Admin. ❌";
            }
        }

        function validateGame(config) {
            const now = new Date().getTime();
            const start = new Date(config.WaktuMulai).getTime();
            const end = new Date(config.WaktuSelesai).getTime();

            if (now < start) {
                document.getElementById('loading-screen').innerHTML = `<h2>Game Belum Dimulai 🔒</h2><p>Arena akan dibuka pada:<br>${config.WaktuMulai}</p>`;
                return;
            }
            if (now > end) {
                document.getElementById('loading-screen').innerHTML = "<h2>Game Sudah Berakhir 🏁</h2><p>Terima kasih telah berpartisipasi!</p>";
                return;
            }

            activeSymbol = config.Aset || "BINANCE:BTCUSDT";
            startGame();
        }

        function startGame() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('tradingview_widget').style.display = 'block';
            document.getElementById('main-panel').style.display = 'block';

            new TradingView.widget({
                "container_id": "tradingview_widget",
                "symbol": activeSymbol,
                "interval": "1",
                "theme": "dark",
                "width": "100%", "height": "350"
            });

            updatePrice(activeSymbol);
        }

        function updatePrice(symbol) {
            const cleanSymbol = symbol.includes(':') ? symbol.split(':')[1] : symbol;
            
            if (cleanSymbol.includes('BTC') || cleanSymbol.includes('USDT') || cleanSymbol.includes('ETH')) {
                fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${cleanSymbol}`)
                    .then(r => r.json())
                    .then(d => {
                        if(d.price) {
                            currentPrice = parseFloat(d.price);
                            document.getElementById('display-price').innerText = `${cleanSymbol}: $${currentPrice.toFixed(2)}`;
                        }
                    }).catch(() => {});
                setTimeout(() => updatePrice(symbol), 2000);
            } else {
                document.getElementById('display-price').innerText = `${cleanSymbol} (Lihat Harga Live di Grafik)`;
                currentPrice = 0; 
            }
        }

        function executeTrade(dir) {
            isTrading = true;
            document.getElementById('trade-ui').style.display = 'none';
            document.getElementById('close-btn').style.display = 'block';
            
            let priceText = currentPrice > 0 ? `$${currentPrice.toFixed(2)}` : "Market Price";
            sendToChannel(`🚀 *TRADE OPEN*\n👤 ${userName}\nAsset: ${activeSymbol}\nDir: ${dir}\nPrice: ${priceText}`);
        }

        function closeTrade() {
            isTrading = false;
            document.getElementById('trade-ui').style.display = 'flex';
            document.getElementById('close-btn').style.display = 'none';
            
            let priceText = currentPrice > 0 ? `$${currentPrice.toFixed(2)}` : "Market Price";
            sendToChannel(`🏁 *TRADE CLOSED*\n👤 ${userName}\nAsset: ${activeSymbol}\nPrice: ${priceText}`);
        }

        function sendToChannel(msg) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: "Markdown" })
            });
        }

        fetchAdminSettings();
    </script>
</body>
</html>
