<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto Backtesting Max</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; background: #131722; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #chart { flex-grow: 1; }
        .controls { padding: 10px; background: #1e222d; text-align: center; border-bottom: 1px solid #333; }
        button { padding: 12px 20px; background: #2962ff; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="nextCandle()">⏭️ Next Candle (Auto Loaded)</button>
        <div id="status" style="font-size: 11px; margin-top: 5px; color: #b2b5be;">Menghubungkan ke Server...</div>
    </div>
    <div id="chart"></div>

    <script>
        let chart, candleSeries, historicalData = [], index = 0;

        // Inisialisasi Grafik
        chart = LightweightCharts.createChart(document.getElementById('chart'), { 
            width: window.innerWidth, height: 350,
            layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' }
        });
        candleSeries = chart.addCandlestickSeries();

        // JALUR TIKUS: Menggunakan Proxy untuk menembus blokir ISP
        async function fetchAutoData() {
            const status = document.getElementById('status');
            // Menggunakan proxy allorigins.win untuk akses API Binance dari Indonesia
            const url = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=500");
            
            try {
                status.innerText = "Mengambil data otomatis...";
                const res = await fetch(url);
                const json = await res.json();
                const data = JSON.parse(json.contents);
                
                historicalData = data.map(d => ({
                    time: d[0] / 1000,
                    open: parseFloat(d[1]),
                    high: parseFloat(d[2]),
                    low: parseFloat(d[3]),
                    close: parseFloat(d[4])
                }));
                
                status.innerText = "Data Otomatis Siap!";
            } catch(e) {
                status.innerText = "Error Proxy: " + e.message;
            }
        }

        function nextCandle() {
            if(historicalData.length > 0 && index < historicalData.length) {
                candleSeries.update(historicalData[index]);
                index++;
            } else {
                alert("Data belum siap atau habis.");
            }
        }

        fetchAutoData();
    </script>
</body>
</html>
