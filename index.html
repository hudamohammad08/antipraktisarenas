<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Anti Praktis ArenaBot - Chart Only</title>
<style>
  :root {
    --bg-0: #0b0f17; /* Warna background TradingView agar serasi jika loading */
  }
  
  body, html { 
    margin: 0; padding: 0; 
    background: var(--bg-0);
    width: 100%;
    height: 100%;
    overflow: hidden; /* Mengunci scroll pada body utama */
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  /* WADAH UTAMA - SEKARANG FULL SCREEN (TIDAK ADA FOOTER) */
  .iframe-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* Memulai penskalaan dari atas */
  }

  /* KOTAK PENYESUAI UKURAN (SCALER) - LOGIKA PERBAIKAN LEBAR */
  #scaler {
    transform-origin: top center; /* Titik tumpu penskalaan di atas tengah */
    will-change: transform; /* Optimalisasi performa pada HP */
  }

  iframe { 
    width: 100%; 
    height: 100%; 
    border: none; 
    display: block; 
    /* Memastikan tidak ada margin internal dari widget TradingView */
    margin: 0; 
    padding: 0;
  }
</style>
</head>
<body>

<div class="iframe-container" id="container">
  <div id="scaler">
    <iframe src="https://strategytune.com/app" allowfullscreen></iframe>
  </div>
</div>

<script>
  // --- FITUR SKALA PRESISI (FIT LEBAR & TINGGI) ---
  function applyPerfectFit() {
    const container = document.getElementById('container');
    const scaler = document.getElementById('scaler');
    
    // Ambil ukuran layar TWA saat ini
    const availableWidth = container.clientWidth;
    const availableHeight = container.clientHeight;
    
    // Tentukan resolusi "Desktop" palsu agar PNL muncul
    // targetWidth diperkecil ke 1100 agar teks tidak terlalu kecil saat disusutkan
    const targetWidth = 1100; 
    const targetHeight = 800; // Tinggi ini cukup untuk memunculkan panel bawah (Orders/PNL)
    
    // Atur ukuran dasar scaler ke ukuran target desktop
    scaler.style.width = targetWidth + 'px';
    scaler.style.height = targetHeight + 'px';

    // Kalkulasi seberapa besar penyusutan yang dibutuhkan agar pas ke layar HP
    // finalScale dihitung agar 1100px desktop pas ke lebar layar HP Anda
    const finalScale = availableWidth / targetWidth;

    // Terapkan penyusutan (skala) secara paksa
    // Ini akan menghilangkan bar hitam di kiri-kanan
    scaler.style.transform = `scale(${finalScale})`;
  }

  // Pantau pergerakan layar (jika diputar atau direformasi oleh Telegram)
  window.addEventListener('resize', applyPerfectFit);
  window.addEventListener('orientationchange', () => {
    setTimeout(applyPerfectFit, 300); // Tunggu sampai layar selesai memutar sempurna
  });
  
  // Eksekusi langsung saat dibuka
  applyPerfectFit();
</script>
</body>
</html>
