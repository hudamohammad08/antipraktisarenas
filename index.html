<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div id="chart" style="width:100%; height:400px;"></div>
    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), { width: window.innerWidth, height: 400 });
        const candleSeries = chart.addCandlestickSeries();

        async function loadData() {
            // Link publik dari Google Sheet Anda
            const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSqO2A3xDUUlmnatgBPWGNW1GE1U456XBN2a9vXck-FTPg6OARaza5jC41c6vKbIzGlU2Z6j6dJ2_TH/pubhtml");
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            
            const chartData = rows.map(row => {
                const [time, open, high, low, close] = row.split(',');
                return { time: parseInt(time) / 1000, open: parseFloat(open), high: parseFloat(high), low: parseFloat(low), close: parseFloat(close) };
            });
            candleSeries.setData(chartData);
        }
        loadData();
    </script>
</body>
</html>
