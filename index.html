<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anti Praktis Arena - Ultimate MT5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; background-color: #131722; color: white; }
        body { display: flex; flex-direction: column; }
        
        #tradingview_widget { flex-grow: 1; width: 100%; display: none; }
        
        .panel { padding: 15px; background: #1e222d; border-top: 1px solid #2b2b2b; flex-shrink: 0; display: none; }
        
        /* Tampilan Info Saldo & Harga */
        .info-header { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        #display-price { font-size: 18px; color: #ff9800; font-weight: bold; margin: 0; }
        #display-balance { font-size: 18px; color: #2196F3; font-weight: bold; margin: 0; }
        
        /* Panel Order (Lot, SL, TP) */
        .order-inputs { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group { flex: 1; display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; color: #b2b5be; margin-bottom: 3px; }
        .input-group input { padding: 8px; border-radius: 5px; border: 1px solid #363c4e; background: #131722; color: white; font-weight: bold; text-align: center; }
        
        /* Panel Info Posisi Aktif */
        #active-trade-info { display: none; background: #2b2b2b; padding: 10px; border-radius: 5px; margin-bottom: 10px; text-align: center; }
        #display-pnl { font-size: 20px; font-weight: bold; margin-top: 5px; }
        .trade-detail-text { font-size: 12px; color: #b2b5be; }
        
        .btn-container { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-sell { background: #ef5350; }
        .btn-buy { background: #26a69a; }
        .btn-close { background: #ff9800; display: none; width: 100%; }
        
        #loading-screen { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 18px; color: #b2b5be; text-align: center; padding: 20px; }

        /* Admin */
        #admin-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 5px; font-size: 14px; z-index: 100; border: 1px solid #363c4e; color: white; }
        #admin-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(19, 23, 34, 0.95); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .admin-box { background: #1e222d; padding: 20px; border-radius: 10px; width: 100%; max-width: 400px; border: 1px solid #363c4e; text-align: center; }
        .admin-box select { width: 100%; padding: 10px; margin-bottom: 15px; background: #131722; color: white; border: 1px solid #363c4e; border-radius: 5px; box-sizing: border-box; }
        .btn-admin-save { background: #2962ff; margin-bottom: 10px; }
        .btn-admin-sheet { background: #00c853; margin-bottom: 10px; }
        .btn-admin-close { background: #787b86; }
    </style>
</head>
<body>

    <button id="admin-btn" onclick="openAdmin()">⚙️ Admin</button>

    <div id="admin-modal">
        <div class="admin-box">
            <h2>⚙️ Panel Admin</h2>
            <button class="btn-admin-sheet" onclick="openGoogleSheet()">📝 Buka Google Sheets</button>
            <hr style="border-color: #363c4e; margin: 20px 0;">
            <select id="local-symbol">
                <option value="FX:XAUUSD">Emas (XAUUSD)</option>
                <option value="BINANCE:BTCUSDT">Bitcoin (BTCUSDT)</option>
            </select>
            <button class="btn-admin-save" onclick="applyLocalSymbol()">Terapkan Sementara</button>
            <button class="btn-admin-close" onclick="closeAdmin()">Tutup Panel</button>
        </div>
    </div>

    <div id="loading-screen">Menyambungkan ke Server... 🔄</div>

    <div id="tradingview_widget"></div>

    <div class="panel" id="main-panel">
        <div class="info-header">
            <h3 id="display-price">Harga: --</h3>
            <h3 id="display-balance">Saldo: $0.00</h3>
        </div>
        
        <div class="order-inputs" id="order-inputs">
            <div class="input-group">
                <label>Lot Size</label>
                <input type="number" id="lot-size" value="0.10" step="0.01" min="0.01">
            </div>
            <div class="input-group">
                <label>Stop Loss</label>
                <input type="number" id="sl-price" value="0.00" step="0.01">
            </div>
            <div class="input-group">
                <label>Take Profit</label>
                <input type="number" id="tp-price" value="0.00" step="0.01">
            </div>
        </div>

        <div id="active-trade-info">
            <div class="trade-detail-text" id="trade-detail-text">BUY 0.10 Lot | Entry: 0.00 | SL: 0.00 | TP: 0.00</div>
            <div id="display-pnl">Floating PnL: $0.00</div>
        </div>
        
        <div class="btn-container" id="trade-ui">
            <button class="btn-sell" onclick="executeTrade('SELL')">SELL</button>
            <button class="btn-buy" onclick="executeTrade('BUY')">BUY</button>
        </div>
        <button id="close-btn" class="btn-close" onclick="closeTrade('MANUAL')">CLOSE POSITION</button>
    </div>

    <script>
        // ========================================================
        const LINK_CSV_GOOGLE_SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSe5vVYhDuO_XWUx0Nol67I_89VlEl2YIUW797yYqiksP5X1jsONaJVEoXhtzcfNrG7iVmiC9EWR50S/pub?output=csv";
        const LINK_EDIT_SHEET = "https://docs.google.com/spreadsheets/d/1vSe5vVYhDuO_XWUx0Nol67I_89VlEl2YIUW797yYqiksP5X1jsONaJVEoXhtzcfNrG7iVmiC9EWR50S/edit"; 
        const BOT_TOKEN = "8776331759:AAFVup_qefWDme_yz7PYUvzDcXJNlJ70yLU";
        const CHAT_ID = "-1003742641612";
        const ADMIN_PIN = "1234";
        // ========================================================

        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.enableClosingConfirmation(); 
        tg.ready();
        
        const userName = tg.initDataUnsafe?.user?.first_name || "Trader";

        let balance = parseFloat(localStorage.getItem('arena_balance'));
        if (isNaN(balance)) { balance = 10000.00; localStorage.setItem('arena_balance', balance); }
        document.getElementById('display-balance').innerText = `Saldo: $${balance.toFixed(2)}`;

        let currentPrice = 0;
        let activeSymbol = "FX:XAUUSD"; 
        let priceInterval;
        let pnlInterval;
        
        // Data Transaksi
        let isTrading = false;
        let tradeDir = '';
        let entryPrice = 0;
        let lotSize = 0.1;
        let slPrice = 0;
        let tpPrice = 0;
        let symbolMultiplier = 100; // 100 Emas, 1 BTC

        function openAdmin() {
            let pin = prompt("Masukkan PIN Admin:");
            if (pin === ADMIN_PIN) document.getElementById('admin-modal').style.display = 'flex';
        }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        function openGoogleSheet() { window.open(LINK_EDIT_SHEET, '_blank'); }
        function applyLocalSymbol() { activeSymbol = document.getElementById('local-symbol').value; closeAdmin(); startGame(); }

        async function fetchAdminSettings() {
            try {
                const response = await fetch(LINK_CSV_GOOGLE_SHEET + "&t=" + new Date().getTime());
                const data = await response.text();
                const rows = data.split('\n');
                const config = {};
                rows.forEach(row => {
                    const columns = row.split(',');
                    if(columns.length >= 2) config[columns[0].trim()] = columns[1].trim();
                });
                validateGame(config);
            } catch (error) { setTimeout(startGame, 2000); }
        }

        function validateGame(config) {
            if(config.Aset) activeSymbol = config.Aset;
            startGame();
        }

        function startGame() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('tradingview_widget').style.display = 'block';
            document.getElementById('main-panel').style.display = 'block';
            document.getElementById('tradingview_widget').innerHTML = "";

            new TradingView.widget({
                "autosize": true, "symbol": activeSymbol, "interval": "1", "timezone": "Asia/Jakarta",
                "theme": "dark", "style": "1", "locale": "en", "enable_publishing": false,
                "hide_top_toolbar": false, "hide_legend": false, "hide_side_toolbar": false, 
                "allow_symbol_change": false, "save_image": false, "container_id": "tradingview_widget"
            });

            symbolMultiplier = activeSymbol.includes('XAU') ? 100 : 1; 

            if (priceInterval) clearInterval(priceInterval);
            updatePrice(activeSymbol);
            priceInterval = setInterval(() => updatePrice(activeSymbol), 1000);
        }

        function updatePrice(symbol) {
            let fetchSymbol = symbol.includes('XAU') ? 'PAXGUSDT' : (symbol.includes('BTC') ? 'BTCUSDT' : '');
            if (fetchSymbol !== "") {
                fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${fetchSymbol}`)
                    .then(r => r.json())
                    .then(d => {
                        if(d.price) {
                            currentPrice = parseFloat(d.price);
                            document.getElementById('display-price').innerText = `${symbol.split(':')[1]}: $${currentPrice.toFixed(2)}`;
                        }
                    }).catch(() => {});
            }
        }

        function executeTrade(dir) {
            if (currentPrice <= 0) { alert("Tunggu sebentar, harga sedang dimuat..."); return; }

            // Ambil nilai dari input pengguna
            lotSize = parseFloat(document.getElementById('lot-size').value) || 0.1;
            slPrice = parseFloat(document.getElementById('sl-price').value) || 0;
            tpPrice = parseFloat(document.getElementById('tp-price').value) || 0;

            isTrading = true;
            tradeDir = dir;
            entryPrice = currentPrice;

            // Atur UI
            document.getElementById('order-inputs').style.display = 'none';
            document.getElementById('trade-ui').style.display = 'none';
            
            document.getElementById('active-trade-info').style.display = 'block';
            document.getElementById('close-btn').style.display = 'block';
            
            document.getElementById('trade-detail-text').innerText = 
                `${tradeDir} ${lotSize} Lot | Entry: ${entryPrice.toFixed(2)} | SL: ${slPrice > 0 ? slPrice : 'None'} | TP: ${tpPrice > 0 ? tpPrice : 'None'}`;

            // PnL & Auto Close Logic (Jalan setiap 1 detik)
            pnlInterval = setInterval(() => {
                let pnlPoints = tradeDir === 'BUY' ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
                let pnlMoney = pnlPoints * lotSize * symbolMultiplier;
                
                let pnlEl = document.getElementById('display-pnl');
                pnlEl.innerText = `Floating PnL: $${pnlMoney.toFixed(2)}`;
                pnlEl.style.color = pnlMoney >= 0 ? '#26a69a' : '#ef5350';

                // Cek SL & TP
                if (slPrice > 0) {
                    if (tradeDir === 'BUY' && currentPrice <= slPrice) closeTrade('Hit SL');
                    if (tradeDir === 'SELL' && currentPrice >= slPrice) closeTrade('Hit SL');
                }
                if (tpPrice > 0) {
                    if (tradeDir === 'BUY' && currentPrice >= tpPrice) closeTrade('Hit TP');
                    if (tradeDir === 'SELL' && currentPrice <= tpPrice) closeTrade('Hit TP');
                }
            }, 1000);

            sendToChannel(`🚀 *TRADE OPEN*\n👤 Trader: *${userName}*\nAsset: *${activeSymbol}*\nPosisi: *${tradeDir}* (${lotSize} Lot)\nEntry: *$${entryPrice.toFixed(2)}*\nSL: ${slPrice > 0 ? '$'+slPrice : 'Tidak ada'}\nTP: ${tpPrice > 0 ? '$'+tpPrice : 'Tidak ada'}`);
        }

        function closeTrade(reason) {
            isTrading = false;
            clearInterval(pnlInterval);

            let closePrice = currentPrice;
            let pnlPoints = tradeDir === 'BUY' ? (closePrice - entryPrice) : (entryPrice - closePrice);
            let finalPnl = pnlPoints * lotSize * symbolMultiplier;
            
            balance += finalPnl;
            if(balance <= 0) { alert("🚨 MARGIN CALL! Saldo habis."); balance = 10000.00; }
            localStorage.setItem('arena_balance', balance);
            document.getElementById('display-balance').innerText = `Saldo: $${balance.toFixed(2)}`;

            // Kembalikan UI
            document.getElementById('order-inputs').style.display = 'flex';
            document.getElementById('trade-ui').style.display = 'flex';
            document.getElementById('active-trade-info').style.display = 'none';
            document.getElementById('close-btn').style.display = 'none';
            
            let resultStatus = finalPnl >= 0 ? "WIN ✅" : "LOSS ❌";
            
            let telegramMsg = `📊 *TRADE REPORT*\n\n`+
                              `👤 Trader: *${userName}*\n`+
                              `📈 Asset: *${activeSymbol}*\n`+
                              `🛒 Order: *${tradeDir}* (${lotSize} Lot)\n`+
                              `🎯 Reason: *${reason === 'MANUAL' ? 'Closed Manual' : reason}*\n`+
                              `🚪 Entry: *$${entryPrice.toFixed(2)}*\n`+
                              `🚪 Exit: *$${closePrice.toFixed(2)}*\n`+
                              `📉 Hasil: *${resultStatus}*\n`+
                              `💰 PnL: *$${finalPnl.toFixed(2)}*\n`+
                              `💼 Saldo Akhir: *$${balance.toFixed(2)}*`;
            
            sendToChannel(telegramMsg);
            alert(`Posisi Ditutup! (${reason})\nHasil: ${resultStatus}\nPnL: $${finalPnl.toFixed(2)}`);
        }

        function sendToChannel(msg) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: "Markdown" })
            });
        }

        fetchAdminSettings();
    </script>
</body>
</html>
