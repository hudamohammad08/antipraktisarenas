<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anti Praktis - Backtesting Max</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; background: #131722; color: white; height: 100vh; display: flex; flex-direction: column; }
        #chart { flex-grow: 1; }
        .controls { padding: 10px; background: #1e222d; text-align: center; }
        button { padding: 10px 20px; background: #2962ff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="nextCandle()">⏭️ Next Bar (Manual)</button>
        <div id="status" style="font-size: 12px; margin-top: 5px;">Menunggu Data CSV...</div>
    </div>
    <div id="chart"></div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSe5vVYhDuO_XWUx0Nol67I_89VlEl2YIUW797yYqiksP5X1jsONaJVEoXhtzcfNrG7iVmiC9EWR50S/pubhtml";
        let chart, candleSeries, data = [], index = 0;

        // Inisialisasi Grafik
        chart = LightweightCharts.createChart(document.getElementById('chart'), { width: window.innerWidth, height: 300 });
        candleSeries = chart.addCandlestickSeries();

        async function loadData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                // Parsing CSV sederhana
                data = text.split('\n').slice(1).map(row => {
                    const [time, open, high, low, close] = row.split(',');
                    return { time: parseInt(time), open: parseFloat(open), high: parseFloat(high), low: parseFloat(low), close: parseFloat(close) };
                });
                document.getElementById('status').innerText = "Data Siap! Klik Next Bar";
            } catch(e) {
                document.getElementById('status').innerText = "Gagal Baca CSV: " + e.message;
            }
        }

        function nextCandle() {
            if(index < data.length) {
                candleSeries.update(data[index]);
                index++;
            }
        }

        loadData();
    </script>
</body>
</html>
