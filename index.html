<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti Praktis Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { 
            margin: 0; padding: 20px; font-family: Arial, sans-serif; 
            background-color: #131722; color: white; text-align: center; 
        }
        /* UI Saldo Baru */
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #welcome-text { margin: 0; font-size: 18px; color: #b2b5be; }
        #balance-display { margin: 0; font-size: 22px; font-weight: bold; color: #fb8c00; } /* Warna Oranye Emas */
        
        #chart { width: 100%; height: 350px; margin-bottom: 10px; }
        #pnl-display { font-size: 20px; font-weight: bold; margin-bottom: 15px; height: 24px; }
        
        .btn-container { display: flex; gap: 10px; width: 100%; }
        button { 
            padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; 
            border: none; cursor: pointer; color: white; width: 100%;
        }
        .btn-buy { background-color: #26a69a; }
        .btn-sell { background-color: #ef5350; }
        .btn-close { background-color: #ff9800; display: none; }
    </style>
</head>
<body>

    <div class="header-container">
        <h3 id="welcome-text">Trader</h3>
        <h3 id="balance-display">$0.00</h3>
    </div>

    <div id="chart"></div>
    <div id="pnl-display"></div>
    
    <div class="btn-container" id="action-buttons">
        <button class="btn-buy" onclick="openTrade('BUY')">BUY</button>
        <button class="btn-sell" onclick="openTrade('SELL')">SELL</button>
    </div>
    
    <button class="btn-close" id="close-btn" onclick="closeTrade()">CLOSE TRADE</button>

    <script>
        // ========================================================
        // PENTING: Masukkan kembali Token dan Chat ID Anda!
        // ========================================================
        const BOT_TOKEN = "8776331759:AAFVup_qefWDme_yz7PYUvzDcXJNlJ70yLU";
        const CHAT_ID = "-1003742641612"; 
        // ========================================================

        // 1. SETUP USER & SALDO (LocalStorage)
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        const userName = tg.initDataUnsafe?.user?.first_name || "Trader Lokal";
        document.getElementById('welcome-text').innerText = "👤 " + userName;

        // Cek apakah user sudah punya saldo sebelumnya di HP-nya
        let balance = parseFloat(localStorage.getItem('arena_balance'));
        if (isNaN(balance)) {
            balance = 10000.00; // Modal Awal $10,000 jika baru pertama kali main
            localStorage.setItem('arena_balance', balance);
        }
        
        function updateBalanceUI() {
            document.getElementById('balance-display').innerText = `💰 $${balance.toFixed(2)}`;
        }
        updateBalanceUI(); // Tampilkan saldo awal

        let isTrading = false;
        let entryPrice = 0;
        let tradeDirection = '';

        // 2. SETUP GRAFIK
        const chartElement = document.getElementById('chart');
        const chart = LightweightCharts.createChart(chartElement, { 
            width: chartElement.clientWidth, 
            height: 350,
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#363c4e' }, horzLines: { color: '#363c4e' } },
            timeScale: { timeVisible: true }
        });
        const candleSeries = chart.addCandlestickSeries();

        let currentPrice = 2350.00; 
        let currentTime = Math.floor(Date.now() / 1000) - (60 * 50); 
        const historyData = [];

        for(let i = 0; i < 50; i++) {
            let open = currentPrice;
            let close = open + ((Math.random() - 0.5) * 4);
            let high = Math.max(open, close) + (Math.random() * 2);
            let low = Math.min(open, close) - (Math.random() * 2);
            
            historyData.push({ 
                time: currentTime, open: parseFloat(open.toFixed(2)), 
                high: parseFloat(high.toFixed(2)), low: parseFloat(low.toFixed(2)), 
                close: parseFloat(close.toFixed(2)) 
            });
            currentPrice = close;
            currentTime += 60; 
        }
        candleSeries.setData(historyData);
        chart.timeScale().fitContent();

        // 3. MESIN LIVE
        setInterval(() => {
            currentTime += 60; 
            let open = currentPrice;
            let close = open + ((Math.random() - 0.5) * 4);
            let high = Math.max(open, close) + (Math.random() * 2);
            let low = Math.min(open, close) - (Math.random() * 2);

            candleSeries.update({
                time: currentTime, open: parseFloat(open.toFixed(2)), 
                high: parseFloat(high.toFixed(2)), low: parseFloat(low.toFixed(2)), 
                close: parseFloat(close.toFixed(2))
            });
            currentPrice = close; 

            if (isTrading) {
                let pnl = tradeDirection === 'BUY' ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
                let pnlEl = document.getElementById('pnl-display');
                pnlEl.innerText = `Floating PnL: $${pnl.toFixed(2)}`;
                pnlEl.style.color = pnl >= 0 ? '#26a69a' : '#ef5350';
            }
        }, 1000);

        // 4. LOGIKA TOMBOL
        function openTrade(direction) {
            isTrading = true;
            tradeDirection = direction;
            entryPrice = currentPrice;
            
            document.getElementById('action-buttons').style.display = 'none';
            document.getElementById('close-btn').style.display = 'block';
            document.getElementById('pnl-display').innerText = "Floating PnL: $0.00";
        }

        function closeTrade() {
            isTrading = false;
            let finalPnl = tradeDirection === 'BUY' ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
            
            // --- UPDATE SALDO ---
            balance += finalPnl; 
            
            // Cek kebangkrutan (Margin Call)
            if (balance <= 0) {
                alert("🚨 MARGIN CALL! 🚨\nSaldo Anda habis. Akun di-reset ke $10,000.");
                balance = 10000.00;
            }

            // Simpan saldo baru ke HP user dan update layar
            localStorage.setItem('arena_balance', balance);
            updateBalanceUI();
            
            document.getElementById('action-buttons').style.display = 'flex';
            document.getElementById('close-btn').style.display = 'none';
            document.getElementById('pnl-display').innerText = ""; 
            
            let status = finalPnl >= 0 ? "WIN ✅" : "LOSS ❌";
            alert(`Trade Selesai!\nStatus: ${status}\nTotal PnL: $${finalPnl.toFixed(2)}\nSaldo Saat Ini: $${balance.toFixed(2)}`);

            kirimLogKeChannel(userName, tradeDirection, status, finalPnl.toFixed(2), balance.toFixed(2));
        }

        // 5. DATABASE CHANNEL
        function kirimLogKeChannel(player, posisi, hasil, pnl, saldoAkhir) {
            const pesan = `📊 *ANTI PRAKTIS ARENA LOG*\n\n` +
                          `👤 Trader: *${player}*\n` +
                          `🚀 Posisi: *${posisi}*\n` +
                          `🎯 Hasil: *${hasil}*\n` +
                          `💰 PnL: *$${pnl}*\n` +
                          `💼 Saldo Akhir: *$${saldoAkhir}*\n\n` +
                          `_Data otomatis tersimpan di serverless database_`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: pesan, parse_mode: "Markdown" })
            }).catch(error => console.error("Error:", error));
        }
    </script>
</body>
</html>
