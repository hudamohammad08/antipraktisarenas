<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backtesting Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #131722; color: white; height: 100vh; display: flex; flex-direction: column; }
        #chart { flex-grow: 1; }
        .panel { padding: 10px; background: #1e222d; text-align: center; }
        button { padding: 12px; background: #2962ff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <div class="panel">
        <button onclick="nextBar()">⏭️ Next Candle (Auto)</button>
        <div id="msg" style="font-size:11px; margin-top:5px; color:#aaa;">Memuat data dari server proxy...</div>
    </div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            width: window.innerWidth, height: 300,
            layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' }
        });
        const series = chart.addCandlestickSeries();
        let history = [], idx = 0;

        // Menggunakan CORS Proxy aman agar tidak kena blokir
        async function init() {
            try {
                const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=500"));
                const json = await res.json();
                const data = JSON.parse(json.contents);
                history = data.map(d => ({ time: d[0]/1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]) }));
                document.getElementById('msg').innerText = "Data Siap!";
            } catch(e) { document.getElementById('msg').innerText = "Error: Pastikan akses internet lancar."; }
        }

        function nextBar() {
            if(idx < history.length) {
                series.update(history[idx]);
                idx++;
            }
        }
        init();
    </script>
</body>
</html>
