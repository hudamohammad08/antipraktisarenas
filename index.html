<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backtesting Arena - TwelveData</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; background: #131722; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #chart { flex-grow: 1; }
        .controls { padding: 15px; background: #1e222d; text-align: center; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; background: #2962ff; color: white; border: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <div class="controls">
        <button onclick="nextBar()">⏭️ Next Candle</button>
        <div id="status" style="font-size: 10px; color: #787b86; align-self: center;">Menunggu Data...</div>
    </div>

    <script>
        const API_URL = "https://api.twelvedata.com/time_series?apikey=910c8e0e5f994e32b57fc7cc795828e9&interval=15min&symbol=XAU/USD&dp=2&timezone=Asia/Jakarta&outputsize=500";
        let chart, series, history = [], idx = 0;

        chart = LightweightCharts.createChart(document.getElementById('chart'), { 
            width: window.innerWidth, height: 350,
            layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' }
        });
        series = chart.addCandlestickSeries();

        async function init() {
            try {
                document.getElementById('status').innerText = "Fetching TwelveData...";
                const res = await fetch(API_URL);
                const json = await res.json();
                
                // TwelveData mengirim data terbaru di atas, jadi kita reverse()
                history = json.values.reverse().map(d => ({
                    time: new Date(d.datetime).getTime() / 1000,
                    open: parseFloat(d.open),
                    high: parseFloat(d.high),
                    low: parseFloat(d.low),
                    close: parseFloat(d.close)
                }));
                
                document.getElementById('status').innerText = "Data Siap!";
            } catch(e) {
                document.getElementById('status').innerText = "Error API: " + e.message;
            }
        }

        function nextBar() {
            if(idx < history.length) {
                series.update(history[idx]);
                idx++;
            } else {
                alert("Simulasi Selesai!");
            }
        }

        init();
    </script>
</body>
</html>
