<div class="panel">
    <div style="padding: 15px; background: #2a2e39; border-radius: 8px; text-align: center;">
        <h4 style="margin: 0 0 10px 0; color: #fff;">Pilih Tanggal Backtest</h4>
        <p style="font-size: 12px; color: #b2b5be; margin-bottom: 15px;">
            Gunakan fitur Replay resmi untuk memilih tanggal dan waktu secara bebas.
        </p>
        <button onclick="openReplay()" style="background: #2962ff; color: white; border: none; padding: 12px 20px; border-radius: 6px; width: 100%; font-weight: bold;">
            🚀 Buka Simulator Tanggal
        </button>
    </div>
</div>

<script>
    function openReplay() {
        // Ini adalah link TradingView dengan fitur replay yang bisa dipilih tanggalnya
        const url = "https://www.tradingview.com/chart/?symbol=FX%3AXAUUSD"; 
        window.open(url, '_blank');
        alert("Pilih ikon 'Replay' (dua panah) di bagian atas grafik untuk memilih tanggal!");
    }
</script>
