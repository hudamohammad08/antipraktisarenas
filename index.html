<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anti Praktis - Backtesting Max</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; background-color: #131722; color: white; }
        body { display: flex; flex-direction: column; }
        
        /* Area Kontrol Replay (Di Atas Grafik) */
        .replay-controls { background: #1e222d; padding: 10px; display: flex; gap: 10px; align-items: center; justify-content: center; border-bottom: 1px solid #2b2b2b; }
        .btn-replay { background: #2962ff; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-replay.pause { background: #ff9800; }
        #replay-date { font-size: 12px; color: #b2b5be; margin-left: 10px; }

        /* Area Grafik */
        #chart-container { flex-grow: 1; width: 100%; position: relative; }
        
        /* Panel Trading Bawah */
        .panel { padding: 12px; background: #1e222d; border-top: 1px solid #2b2b2b; flex-shrink: 0; max-height: 50%; overflow-y: auto; }
        .info-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        #display-price { font-size: 16px; color: #ff9800; font-weight: bold; margin: 0; }
        #display-balance { font-size: 16px; color: #2196F3; font-weight: bold; margin: 0; }
        
        .order-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .input-group label { font-size: 11px; color: #b2b5be; display: block; margin-bottom: 3px; }
        .input-group input { width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #363c4e; background: #131722; color: white; text-align: center; box-sizing: border-box; }
        
        .btn-container { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-sell { background: #ef5350; flex: 1; padding: 10px; border: none; border-radius: 6px; color: white; font-weight: bold; }
        .btn-buy { background: #26a69a; flex: 1; padding: 10px; border: none; border-radius: 6px; color: white; font-weight: bold; }
        
        /* Tabel Posisi */
        .table-container { background: #131722; border-radius: 4px; overflow-x: auto; max-height: 100px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
        th { background: #1c2030; color: #787b86; padding: 6px; }
        td { padding: 6px; border-bottom: 1px solid #2b2b2b; }
        .btn-close { background: #ff9800; border: none; padding: 3px 6px; border-radius: 3px; color: white; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

    <div class="replay-controls">
        <button class="btn-replay" id="btn-play" onclick="togglePlay()">▶️ Play</button>
        <button class="btn-replay" onclick="nextCandle()">⏭️ Next Bar</button>
        <div id="replay-date">Memuat Data Riwayat...</div>
    </div>

    <div id="chart-container"></div>

    <div class="panel">
        <div class="info-header">
            <h3 id="display-price">Replay Price: --</h3>
            <h3 id="display-balance">Saldo: $10000.00</h3>
        </div>
        
        <div class="order-grid">
            <div class="input-group">
                <label>Lot Size</label>
                <input type="number" id="lot-size" value="0.10" step="0.01">
            </div>
            <div class="input-group">
                <label>Stop Loss (Harga)</label>
                <input type="number" id="sl-val" value="0.00" step="0.01">
            </div>
            <div class="input-group">
                <label>Take Profit (Harga)</label>
                <input type="number" id="tp-val" value="0.00" step="0.01">
            </div>
        </div>
        
        <div class="btn-container">
            <button class="btn-sell" onclick="openTrade('SELL')">SELL</button>
            <button class="btn-buy" onclick="openTrade('BUY')">BUY</button>
        </div>

        <div class="table-container">
            <table>
                <thead><tr><th>Posisi</th><th>Lot</th><th>Entry</th><th>Replay PnL</th><th>Aksi</th></tr></thead>
                <tbody id="trade-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // --- VARIABEL MESIN BACKTESTING ---
        let chart, candleSeries;
        let historicalData = [];   // Menyimpan seluruh riwayat dari Binance
        let currentCandleIndex = 0; // Posisi candle saat ini (Mesin Waktu)
        let isPlaying = false;
        let playInterval;
        let currentPrice = 0; // Harga saat di masa lalu
        
        let balance = 10000.00;
        let openTrades = [];

        // 1. MEMBANGUN GRAFIK KOSONG
        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#2b2b2b' }, horzLines: { color: '#2b2b2b' } },
                timeScale: { timeVisible: true, secondsVisible: false }
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
                wickUpColor: '#26a69a', wickDownColor: '#ef5350'
            });
        }

        // 2. MENGAMBIL DATA RIWAYAT DARI BINANCE (Masa Lalu)
        async function fetchHistory() {
            // Contoh kita ambil BTCUSDT timeframe 1 Jam.
            // Anda bisa ubah parameter startTime & endTime menggunakan sistem Timestamp (milidetik).
            // Default di sini menarik 1000 candle terakhir untuk dicoba.
            const url = `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=500`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                historicalData = data.map(d => ({
                    time: d[0] / 1000, // Konversi ke detik untuk Lightweight Charts
                    open: parseFloat(d[1]),
                    high: parseFloat(d[2]),
                    low: parseFloat(d[3]),
                    close: parseFloat(d[4])
                }));

                // Masukkan 50 candle pertama ke layar sebagai awalan
                let initialData = historicalData.slice(0, 50);
                candleSeries.setData(initialData);
                
                currentCandleIndex = 50; // Set posisi mesin waktu
                updatePriceDisplay();
                
            } catch (err) { alert("Gagal memuat data riwayat."); }
        }

        // 3. LOGIKA MESIN WAKTU (REPLAY PLAY/PAUSE)
        function togglePlay() {
            isPlaying = !isPlaying;
            let btn = document.getElementById('btn-play');
            
            if (isPlaying) {
                btn.innerText = "⏸️ Pause";
                btn.classList.add('pause');
                // Putar 1 candle setiap 1 detik
                playInterval = setInterval(nextCandle, 1000); 
            } else {
                btn.innerText = "▶️ Play";
                btn.classList.remove('pause');
                clearInterval(playInterval);
            }
        }

        // 4. MEMUNCULKAN CANDLE BERIKUTNYA KE LAYAR (MEMAJUKAN WAKTU)
        function nextCandle() {
            if (currentCandleIndex < historicalData.length) {
                let newCandle = historicalData[currentCandleIndex];
                candleSeries.update(newCandle); // Tambah 1 bar ke grafik
                currentCandleIndex++;
                updatePriceDisplay();
                checkTrades(); // Cek SL/TP di harga masa lalu ini
            } else {
                togglePlay();
                alert("Simulasi Selesai. Data riwayat habis.");
            }
        }

        function updatePriceDisplay() {
            let activeCandle = historicalData[currentCandleIndex - 1];
            currentPrice = activeCandle.close; // Harga di saat itu
            
            // Format Waktu Tampilan
            let dateObj = new Date(activeCandle.time * 1000);
            document.getElementById('replay-date').innerText = dateObj.toLocaleString('id-ID');
            document.getElementById('display-price').innerText = `BTCUSDT Replay: $${currentPrice.toFixed(2)}`;
            
            renderTable(); // Update tabel agar Floating PnL ikut bergerak
        }

        // --- SISTEM TRADING (Backtesting) ---
        function openTrade(dir) {
            let lot = parseFloat(document.getElementById('lot-size').value) || 0.1;
            let sl = parseFloat(document.getElementById('sl-val').value) || 0;
            let tp = parseFloat(document.getElementById('tp-val').value) || 0;

            let trade = {
                id: Date.now(),
                dir: dir,
                lot: lot,
                entry: currentPrice,
                sl: sl,
                tp: tp
            };
            openTrades.push(trade);
            renderTable();
        }

        function checkTrades() {
            // Logika Auto-Close Pengecekan SL dan TP
            for (let i = openTrades.length - 1; i >= 0; i--) {
                let t = openTrades[i];
                if (t.sl > 0) {
                    if ((t.dir === 'BUY' && currentPrice <= t.sl) || (t.dir === 'SELL' && currentPrice >= t.sl)) { closeTrade(t.id); continue; }
                }
                if (t.tp > 0) {
                    if ((t.dir === 'BUY' && currentPrice >= t.tp) || (t.dir === 'SELL' && currentPrice <= t.tp)) { closeTrade(t.id); continue; }
                }
            }
        }

        function closeTrade(id) {
            let index = openTrades.findIndex(t => t.id === id);
            if (index === -1) return;
            
            let t = openTrades[index];
            let pnl = t.dir === 'BUY' ? (currentPrice - t.entry) : (t.entry - currentPrice);
            let finalPnl = pnl * t.lot; // Misal tanpa multiplier ribet (1:1)
            
            balance += finalPnl;
            document.getElementById('display-balance').innerText = `Saldo: $${balance.toFixed(2)}`;
            
            openTrades.splice(index, 1);
            renderTable();
        }

        function renderTable() {
            let html = "";
            openTrades.forEach(t => {
                let pnl = t.dir === 'BUY' ? (currentPrice - t.entry) : (t.entry - currentPrice);
                let finalPnl = pnl * t.lot;
                let color = finalPnl >= 0 ? '#26a69a' : '#ef5350';
                
                html += `<tr>
                    <td><strong style="color:${t.dir==='BUY'?'#26a69a':'#ef5350'}">${t.dir}</strong></td>
                    <td>${t.lot}</td>
                    <td>${t.entry.toFixed(2)}</td>
                    <td style="color:${color}; font-weight:bold;">$${finalPnl.toFixed(2)}</td>
                    <td><button class="btn-close" onclick="closeTrade(${t.id})">X</button></td>
                </tr>`;
            });
            document.getElementById('trade-body').innerHTML = html;
        }

        // --- MULAI SISTEM ---
        initChart();
        fetchHistory();
    </script>
</body>
</html>
