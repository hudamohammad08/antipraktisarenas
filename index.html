<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b0f17" />
<title>Backtesting Max Arena — XAU/USD</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root { --bg-0: #0b0f17; --bg-1: #111827; --bg-2: #1a2233; --line: #1f2a3d; --text: #e6edf7; --accent: #f5b301; --green: #22c55e; --red: #ef4444; --blue: #3b82f6; }
  body { margin: 0; background: var(--bg-0); color: var(--text); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }
  .chart-wrap { flex: 1; position: relative; }
  #chart { position: absolute; inset: 0; }
  .controls { height: 160px; background: var(--bg-1); border-top: 1px solid var(--line); padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; gap: 6px; align-items: center; }
  .seg { display: inline-flex; background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .seg button { background: transparent; color: var(--text); border: 0; padding: 6px 10px; font-size: 11px; cursor: pointer; }
  .seg button.active { background: var(--accent); color: #000; }
  .btn { background: var(--accent); color: #000; border: 0; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div class="chart-wrap"><div id="chart"></div></div>
  <div class="controls">
    <div class="row">
      <div class="seg" id="tfSeg">
        <button data-tf="Base" class="active">Base</button>
        <button data-tf="1H">1H</button>
        <button data-tf="4H">4H</button>
        <button data-tf="1D">1D</button>
      </div>
    </div>
    <div class="row">
      <button class="btn" onclick="nextCandle()">Next Candle ▶</button>
      <button class="btn" style="background:var(--green)" onclick="nextCandle()">BUY</button>
      <button class="btn" style="background:var(--red)" onclick="nextCandle()">SELL</button>
    </div>
  </div>
</div>

<script>
(function() {
  const SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQk1O9CGYTBQ2_GdpqRCJd6LFXj2DJZddPaZXzXuYpdFeYgBd6dYEpaJQnowmAO1oKJ3XlCLmQzIPex/pub?output=csv";
  const chart = LightweightCharts.createChart(document.getElementById('chart'), { 
    autoSize: true, 
    layout: { background: { type: 'solid', color: '#0b0f17' }, textColor: '#ccc' },
    timeScale: { barSpacing: 15, rightOffset: 10 } // FIX: Menambah lebar candle (barSpacing) dan offset
  });
  const candleSeries = chart.addCandlestickSeries();
  let masterCandles = [], allCandles = [], visibleIdx = 0;

  function parseClean(val) {
    let s = val.toString().replace(/['"\s]/g, '');
    if (s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g, '').replace(',', '.');
    else s = s.replace(/,/g, '');
    return parseFloat(s) || 0;
  }

  async function fetchHistory() {
    const res = await fetch(SPREADSHEET_URL + "&t=" + Date.now());
    const csv = await res.text();
    const rows = csv.trim().split('\n'); rows.shift();
    masterCandles = rows.map(r => {
      const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      return { 
        time: Math.floor(new Date(c[0].replace(/["']/g, '').replace(' ', 'T') + 'Z').getTime() / 1000), 
        open: parseClean(c[1]), high: parseClean(c[2]), low: parseClean(c[3]), close: parseClean(c[4]) 
      };
    }).filter(c => c.time && c.close > 0).sort((a,b) => a.time - b.time);
    applyTF('Base');
  }

  function applyTF(tf) {
    if (tf === 'Base') {
      allCandles = masterCandles;
    } else {
      let interval = tf === '1H' ? 3600 : tf === '4H' ? 14400 : 86400;
      let resampled = [];
      masterCandles.forEach(d => {
        let t = Math.floor(d.time / interval) * interval;
        if (!resampled.length || resampled[resampled.length-1].time !== t) {
          resampled.push({ time: t, open: d.open, high: d.high, low: d.low, close: d.close });
        } else {
          let last = resampled[resampled.length-1];
          last.high = Math.max(last.high, d.high);
          last.low = Math.min(last.low, d.low);
          last.close = d.close;
        }
      });
      allCandles = resampled;
    }
    visibleIdx = Math.min(50, allCandles.length);
    candleSeries.setData(allCandles.slice(0, visibleIdx));
  }

  window.nextCandle = function() {
    if (visibleIdx < allCandles.length) {
      candleSeries.update(allCandles[visibleIdx]);
      visibleIdx++;
      // FIX: Scroll otomatis ke candle terbaru saat update
      chart.timeScale().scrollToPosition(1, true);
    }
  }

  document.querySelectorAll('#tfSeg button').forEach(b => {
    b.addEventListener('click', (e) => {
      document.querySelectorAll('#tfSeg button').forEach(x => x.classList.remove('active'));
      e.target.classList.add('active');
      applyTF(e.target.dataset.tf);
    });
  });

  fetchHistory();
})();
</script>
</body>
</html>
