<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Simulator</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #131722; color: white; overflow: hidden; }
        /* Container grafik dipaksa harus tampil */
        #chart-container { width: 100vw; height: 85vh; display: block; }
        .footer-controls { height: 15vh; display: flex; align-items: center; justify-content: center; background: #1e222d; }
        button { width: 90%; padding: 15px; background: #2962ff; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div id="chart-container"></div>
    <div class="footer-controls">
        <button onclick="nextBar()">⏭️ Next Candle</button>
    </div>

    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
            width: window.innerWidth,
            height: window.innerHeight * 0.85
        });

        const series = chart.addCandlestickSeries();
        
        // Data internal agar tidak perlu internet (Anti-Blokir)
        const data = [
            { time: 1717700000, open: 2350, high: 2360, low: 2340, close: 2355 },
            { time: 1717703600, open: 2355, high: 2370, low: 2350, close: 2365 },
            { time: 1717707200, open: 2365, high: 2380, low: 2360, close: 2375 },
            { time: 1717710800, open: 2375, high: 2390, low: 2370, close: 2385 }
        ];

        let i = 0;
        function nextBar() {
            if(i < data.length) {
                series.update(data[i]);
                i++;
            }
        }
    </script>
</body>
</html>
