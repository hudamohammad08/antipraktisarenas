<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b0f17" />
<title>Backtesting Max Arena — XAU/USD</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

<style>
  :root {
    --bg-0: #0b0f17; --bg-1: #111827; --bg-2: #1a2233; --line: #1f2a3d;
    --text: #e6edf7; --muted: #8a97ad; --accent: #f5b301;
    --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --warn: #f59e0b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; overscroll-behavior: none; user-select: none; height: 100%; }
  #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }

  /* TOP BAR */
  .topbar { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--bg-1); border-bottom: 1px solid var(--line); }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; }
  .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .pair-tag { font-size: 11px; color: var(--accent); background: rgba(245,179,1,0.08); border: 1px solid rgba(245,179,1,0.25); padding: 2px 6px; border-radius: 4px; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .status .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .status.ok .pulse { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status.err .pulse { background: var(--red); }
  .status.loading .pulse { background: var(--warn); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  /* CHART AREA */
  .chart-wrap { flex: 1 1 85%; position: relative; min-height: 0; background: var(--bg-0); }
  #chart { position: absolute; inset: 0; }
  
  /* DRAWING CANVAS OVERLAY */
  #drawingCanvas { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

  .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; text-align: center; background: rgba(11,15,23,0.92); z-index: 5; padding: 20px; }
  .overlay .card { max-width: 320px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px; padding: 18px; }
  .overlay h3 { margin: 0 0 8px; font-size: 15px; }
  .overlay p { margin: 0 0 12px; color: var(--muted); font-size: 12px; line-height: 1.5; }
  .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; margin: 0 auto 10px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HUD */
  .hud { position: absolute; top: 8px; left: 8px; z-index: 3; display: flex; flex-direction: column; gap: 4px; background: rgba(17,24,39,0.7); backdrop-filter: blur(6px); border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font-size: 11px; pointer-events: none; }
  .hud .ohlc { display: flex; gap: 8px; color: var(--text); font-variant-numeric: tabular-nums; }
  .hud .ohlc span b { color: var(--muted); font-weight: 500; margin-right: 2px; }
  
  .pnl-badge { position: absolute; top: 8px; right: 8px; z-index: 3; background: rgba(17,24,39,0.7); backdrop-filter: blur(6px); border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; font-size: 11px; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .pnl-badge .label { color: var(--muted); font-size: 10px; }
  .pnl-badge .value { font-weight: 700; font-variant-numeric: tabular-nums; }
  .pos { color: var(--green); } .neg { color: var(--red); }

  /* CONTROLS */
  .controls { flex: 0 0 auto; min-height: 15dvh; background: var(--bg-1); border-top: 1px solid var(--line); padding: 8px 10px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }
  .row.scroll { overflow-x: auto; }
  .row.scroll::-webkit-scrollbar { display: none; }
  .seg { display: inline-flex; background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .seg button { background: transparent; color: var(--muted); border: 0; padding: 6px 9px; font-size: 11px; cursor: pointer; font-weight: 600; white-space: nowrap; }
  .seg button.active { background: var(--accent); color: #0b0f17; }

  .btn { background: var(--bg-2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: transform 0.05s ease; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--accent); color: #0b0f17; border-color: var(--accent); }
  .btn.buy { background: var(--green); color: #fff; border-color: var(--green); }
  .btn.sell { background: var(--red); color: #fff; border-color: var(--red); }
  .btn.terminal { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn.ghost { background: transparent; border-color: var(--line); }
  .grow { flex: 1 1 auto; }

  /* MODALS */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(2px); display: none; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px; width: 100%; max-width: 380px; padding: 16px; }
  .modal h3 { margin: 0 0 12px; font-size: 14px; }
  .modal label { display: block; font-size: 11px; color: var(--muted); margin: 8px 0 4px; }
  .modal input { width: 100%; background: var(--bg-2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; font-size: 12px; outline: none; }
  .modal .row-btn { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
  
  /* TERMINAL TABLE */
  .term-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
  .term-table th { padding: 6px; color: var(--muted); border-bottom: 1px solid var(--line); }
  .term-table td { padding: 8px 6px; border-bottom: 1px solid var(--line); }
  .btn-close { background: #ef4444; border: none; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

  /* TOAST */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--bg-2); border: 1px solid var(--line); padding: 8px 14px; border-radius: 999px; font-size: 12px; z-index: 60; opacity: 0; transition: 0.3s ease; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="brand"><div class="dot"></div><span>Backtesting Arena</span><span class="pair-tag">XAU/USD</span></div>
    <div class="status loading" id="statusBox"><div class="pulse"></div><span id="statusText">Loading…</span></div>
  </div>

  <div class="chart-wrap">
    <div id="chart"></div>
    <canvas id="drawingCanvas"></canvas>
    
    <div class="hud" id="hud" style="display:none;">
      <div class="ohlc" id="ohlc"></div>
      <div style="color:var(--accent)" id="progressLabel"></div>
    </div>
    <div class="pnl-badge" id="pnlBadge" style="display:none;">
      <span class="label">Balance</span><span class="value" id="balanceVal">$10,000.00</span>
      <span class="label" style="margin-top:2px;">Floating P&L</span><span class="value" id="pnlVal">$0.00</span>
    </div>

    <div class="overlay" id="loadingOverlay">
      <div class="card"><div class="spinner"></div><h3>Loading Data</h3><p>Membaca database dari Google Sheets...</p></div>
    </div>
  </div>

  <div class="controls">
    <div class="row scroll">
      <span style="font-size: 10px; color: var(--muted); margin-right: 2px;">TF</span>
      <div class="seg" id="tfSeg">
        <button data-tf="Base" class="active">Base</button>
        <button data-tf="1H">1H</button>
        <button data-tf="4H">4H</button>
        <button data-tf="1D">1D</button>
      </div>

      <span style="font-size: 10px; color: var(--muted); margin-left: 8px; margin-right: 2px;">SPEED</span>
      <div class="seg" id="speedSeg">
        <button data-speed="2000" class="active">1x</button>
        <button data-speed="800">2x</button>
        <button data-speed="300">5x</button>
        <button data-speed="50">MAX</button>
      </div>
      <div class="grow"></div>
      <button class="btn ghost" onclick="openModal('dateModal')">📅 Date</button>
      <button class="btn terminal" id="btnTerminal">💼 (0)</button>
    </div>

    <div class="row scroll" style="border-top: 1px solid var(--line); padding-top: 4px;">
      <span style="font-size: 10px; color: var(--muted); margin-right: 2px;">ZONA</span>
      <div class="seg" id="toolSeg">
        <button data-tool="pointer" class="active">Cursor</button>
        <button data-tool="line">Garis Tren</button>
        <button data-tool="rect">Persegi</button>
      </div>
      <button class="btn ghost" style="padding: 4px 8px; font-size: 11px;" id="clearDrawingsBtn">🗑 Clear</button>
    </div>

    <div class="row">
      <button class="btn buy" onclick="openOrderModal('BUY')">BUY</button>
      <button class="btn sell" onclick="openOrderModal('SELL')">SELL</button>
      <div class="grow"></div>
      <button class="btn" id="playBtn">▶ Play</button>
      <button class="btn primary" id="nextBtn">Next ▶</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="dateModal">
  <div class="modal">
    <h3>📅 Pilih Tanggal Replay</h3>
    <p style="font-size: 11px; color: var(--muted); margin-top:0;">Potong data dari Database untuk mensimulasikan rentang waktu tertentu.</p>
    
    <label>Mulai dari (Start Date)</label>
    <input type="date" id="inStartDate">
    
    <label>Sampai dengan (End Date - Opsional)</label>
    <input type="date" id="inEndDate">
    
    <div class="row-btn">
      <button class="btn ghost" onclick="closeModal('dateModal')">Cancel</button>
      <button class="btn primary" onclick="applyFilters()">Terapkan Data</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="orderModal">
  <div class="modal">
    <h3 id="orderTitle">New Order</h3>
    <label>Lot Size</label><input type="number" id="inLot" value="0.10" step="0.01">
    <label>Entry Price (Biarkan 0 untuk Market Execution)</label><input type="number" id="inEntry" value="0" step="0.1">
    <label>Stop Loss (SL) Price</label><input type="number" id="inSl" value="0" step="0.1">
    <label>Take Profit (TP) Price</label><input type="number" id="inTp" value="0" step="0.1">
    <div class="row-btn">
      <button class="btn ghost" onclick="closeModal('orderModal')">Cancel</button>
      <button class="btn primary" id="confirmOrderBtn">Execute Order</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="terminalModal">
  <div class="modal" style="max-width: 450px;">
    <h3>💼 Terminal (Posisi Aktif)</h3>
    <div style="overflow-y:auto; max-height:250px;">
      <table class="term-table">
        <thead><tr><th>Side</th><th>Lot</th><th>Entry</th><th>SL/TP</th><th>PnL</th><th>Act</th></tr></thead>
        <tbody id="terminalBody"></tbody>
      </table>
    </div>
    <div class="row-btn">
      <button class="btn ghost" onclick="closeModal('terminalModal')">Tutup Panel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';
  const $ = id => document.getElementById(id);
  
  const SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQk1O9CGYTBQ2_GdpqRCJd6LFXj2DJZddPaZXzXuYpdFeYgBd6dYEpaJQnowmAO1oKJ3XlCLmQzIPex/pub?output=csv";
  
  let masterCandles = []; 
  let allCandles = [];    
  let visibleIdx = 0, speedMs = 2000, playing = false, playTimer = null;
  let currentTF = 'Base'; 
  
  let balance = 10000.00;
  let openTrades = []; 
  let tempOrderSide = '';

  // DRAWING STATE ENGINE
  let currentTool = 'pointer';
  let drawings = [];
  let isDrawing = false;
  let activeDrawing = null;

  const canvas = $('drawingCanvas');
  const ctx = canvas.getContext('2d');

  // CHART INITIALIZATION
  const chart = LightweightCharts.createChart($('chart'), {
    autoSize: true, 
    layout: { background: { type: 'solid', color: '#0b0f17' }, textColor: '#8a97ad' },
    grid: { vertLines: { color: '#1a2233' }, horzLines: { color: '#1a2233' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#1f2a3d' },
    timeScale: { 
      borderColor: '#1f2a3d', 
      timeVisible: true,
      rightOffset: 5, 
      barSpacing: 10  
    }
  });
  
  const candleSeries = chart.addCandlestickSeries({ 
    upColor: '#22c55e', downColor: '#ef4444', 
    borderUpColor: '#22c55e', borderDownColor: '#ef4444',
    wickUpColor: '#22c55e', wickDownColor: '#ef4444' 
  });

  chart.subscribeCrosshairMove((param) => {
    if (param.seriesData) {
      const d = param.seriesData.get(candleSeries);
      if (d) updateHUD(d);
    }
  });

  // Sinkronisasi render canvas saat chart digeser/dizoom
  chart.timeScale().subscribeVisibleTimeRangeChange(() => {
    redrawCanvas();
  });

  function parseCleanNumber(str) {
    if (!str) return 0;
    let s = str.toString().replace(/['"\s]/g, '');
    let lastComma = s.lastIndexOf(',');
    let lastDot = s.lastIndexOf('.');
    if (lastComma > lastDot) s = s.replace(/\./g, '').replace(',', '.');
    else s = s.replace(/,/g, '');
    let result = parseFloat(s);
    return isNaN(result) ? 0 : result;
  }

  // FETCH & FILTER WEEKEND DATA MARKET
  async function fetchHistory() {
    try {
      const res = await fetch(SPREADSHEET_URL + "&t=" + new Date().getTime());
      if (!res.ok) throw new Error("Gagal mengambil data");
      
      const csv = await res.text();
      const rows = csv.trim().split('\n');
      rows.shift(); 
      
      masterCandles = rows.map(r => {
        const cols = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        let timeStr = (cols[0] || '').replace(/["']/g, ''); 
        const unixTime = Math.floor(new Date(timeStr.replace(' ', 'T') + 'Z').getTime() / 1000);
        return { 
          time: unixTime, 
          open: parseCleanNumber(cols[1]), 
          high: parseCleanNumber(cols[2]), 
          low: parseCleanNumber(cols[3]), 
          close: parseCleanNumber(cols[4]),
          rawDate: timeStr 
        };
      }).filter(c => {
        if (!c.time || !c.close || c.close <= 0) return false;
        
        // REVISI 2: Proteksi penyaringan data hari libur (Weekend)
        const dateObj = new Date(c.time * 1000);
        const utcDay = dateObj.getUTCDay(); // 0 = Minggu, 6 = Sabtu
        const utcHours = dateObj.getUTCHours();

        if (utcDay === 6) return false; // Sabtu libur total
        if (utcDay === 0 && utcHours < 22) return false; // Minggu sebelum market open (jam 22:00 UTC) tutup
        
        return true;
      }).sort((a,b) => a.time - b.time);

      if(masterCandles.length === 0) throw new Error("Dataset kosong.");

      $('inStartDate').value = masterCandles[0].rawDate.split(' ')[0];
      $('inEndDate').value = masterCandles[masterCandles.length - 1].rawDate.split(' ')[0];

      applyFilters(); 

      $('loadingOverlay').style.display = 'none';
      $('hud').style.display = 'flex'; $('pnlBadge').style.display = 'flex';
      $('statusBox').className = 'status ok'; $('statusText').innerText = 'Connected';
      
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    } catch(e) {
      console.error(e);
      $('statusBox').className = 'status err'; $('statusText').innerText = 'Error Database';
      $('loadingOverlay').innerHTML = `<div class="card"><h3 style="color:#ef4444">⚠ Error Parser</h3><p>${e.message}</p><button onclick="window.location.reload()">Refresh</button></div>`;
    }
  }

  function aggregateCandles(data, tf) {
    if (tf === 'Base') return data;
    
    let periodSec;
    if (tf === '1H') periodSec = 3600;
    else if (tf === '4H') periodSec = 14400;
    else if (tf === '1D') periodSec = 86400;
    else return data;

    let resampled = [];
    let cur = null;

    data.forEach(d => {
      let tWib = d.time + 25200; 
      let periodStart = Math.floor(tWib / periodSec) * periodSec - 25200;

      if (!cur || cur.time !== periodStart) {
        if (cur) resampled.push(cur);
        cur = { time: periodStart, open: d.open, high: d.high, low: d.low, close: d.close };
      } else {
        cur.high = Math.max(cur.high, d.high);
        cur.low = Math.min(cur.low, d.low);
        cur.close = d.close;
      }
    });
    if (cur) resampled.push(cur);
    return resampled;
  }

  window.applyFilters = function() {
    let startVal = $('inStartDate').value;
    let endVal = $('inEndDate').value;

    if (!startVal) { toast("Start Date wajib diisi!", "error"); return; }

    let startUnix = new Date(startVal + "T00:00:00Z").getTime() / 1000;
    let endUnix = endVal ? new Date(endVal + "T23:59:59Z").getTime() / 1000 : Infinity;

    let dateFiltered = masterCandles.filter(c => c.time >= startUnix && c.time <= endUnix);

    if (dateFiltered.length === 0) {
      toast("Tidak ada data pada tanggal tersebut!", "error");
      return;
    }

    let finalData = aggregateCandles(dateFiltered, currentTF);

    stopPlay();
    openTrades.forEach(t => candleSeries.removePriceLine(t.lineObj));
    openTrades = [];
    drawings = [];
    redrawCanvas();
    balance = 10000.00;
    calculateFloatingPnL(0);
    
    allCandles = finalData;
    resetAndRenderChart();
    closeModal('dateModal');
    toast(`Terapkan: ${allCandles.length} Bar (${currentTF})`, 'success');
  }

  function resetAndRenderChart() {
    visibleIdx = Math.min(60, allCandles.length); 
    candleSeries.setData(allCandles.slice(0, visibleIdx));
    
    setTimeout(() => { chart.timeScale().scrollToRealTime(); }, 100);
    
    if(visibleIdx > 0) updateHUD(allCandles[visibleIdx - 1]);
    updateProgress();
    setTimeout(redrawCanvas, 200);
  }

  function nextCandle() {
    if (visibleIdx >= allCandles.length) { stopPlay(); toast('Data habis!', 'success'); return; }
    
    const c = allCandles[visibleIdx];
    candleSeries.update(c);
    visibleIdx++;
    updateHUD(c);
    updateProgress();

    let closedAny = false;
    for (let i = openTrades.length - 1; i >= 0; i--) {
      let t = openTrades[i];
      let hitPrice = 0;
      let reason = '';

      if (t.side === 'BUY') {
        if (t.sl > 0 && c.low <= t.sl) { hitPrice = t.sl; reason = 'SL Hit'; }
        else if (t.tp > 0 && c.high >= t.tp) { hitPrice = t.tp; reason = 'TP Hit'; }
      } else {
        if (t.sl > 0 && c.high >= t.sl) { hitPrice = t.sl; reason = 'SL Hit'; }
        else if (t.tp > 0 && c.low <= t.tp) { hitPrice = t.tp; reason = 'TP Hit'; }
      }

      if (hitPrice > 0) {
        executeCloseTrade(t.id, hitPrice, reason);
        closedAny = true;
      }
    }

    calculateFloatingPnL(c.close);
    if(closedAny) renderTerminal();
    redrawCanvas();
  }

  function togglePlay() {
    playing = !playing;
    $('playBtn').innerHTML = playing ? '⏸ Pause' : '▶ Play';
    if(playing) playTimer = setInterval(nextCandle, speedMs);
    else clearInterval(playTimer);
  }

  // TRADING SYSTEM
  window.openOrderModal = function(side) {
    if(!allCandles.length) return;
    tempOrderSide = side;
    $('orderTitle').innerText = `New ${side} Order`;
    $('inEntry').value = "0"; 
    $('orderModal').classList.add('open');
  }

  $('confirmOrderBtn').addEventListener('click', () => {
    let lot = parseFloat($('inLot').value) || 0.1;
    let entryInput = parseFloat($('inEntry').value) || 0;
    let sl = parseFloat($('inSl').value) || 0;
    let tp = parseFloat($('inTp').value) || 0;
    
    let currentPx = allCandles[visibleIdx - 1].close;
    let entry = entryInput > 0 ? entryInput : currentPx;

    let trade = { id: Date.now(), side: tempOrderSide, lot: lot, entry: entry, sl: sl, tp: tp, lineObj: null };

    trade.lineObj = candleSeries.createPriceLine({
      price: entry, color: trade.side === 'BUY' ? '#22c55e' : '#ef4444',
      lineWidth: 1, lineStyle: 2, title: `${trade.side} ${lot}L`
    });

    openTrades.push(trade);
    closeModal('orderModal');
    toast(`${trade.side} Executed @ ${entry.toFixed(2)}`, 'success');
    calculateFloatingPnL(currentPx);
    renderTerminal();
  });

  function calculateFloatingPnL(currentPx) {
    let totalPnL = 0;
    openTrades.forEach(t => {
      let diff = t.side === 'BUY' ? (currentPx - t.entry) : (t.entry - currentPx);
      t.livePnl = diff * t.lot * 100;
      totalPnL += t.livePnl;
    });

    $('balanceVal').innerText = fmtMoney(balance);
    $('pnlVal').innerText = fmtMoney(totalPnL);
    $('pnlVal').className = 'value ' + (totalPnL >= 0 ? 'pos' : 'neg');
    $('btnTerminal').innerText = `💼 (${openTrades.length})`;
  }

  window.executeCloseTrade = function(id, forcePrice = 0, reason = 'Manual') {
    let idx = openTrades.findIndex(t => t.id === id);
    if(idx === -1) return;
    
    let t = openTrades[idx];
    let closePx = forcePrice > 0 ? forcePrice : allCandles[visibleIdx - 1].close;
    let diff = t.side === 'BUY' ? (closePx - t.entry) : (t.entry - closePx);
    let realizedPnL = diff * t.lot * 100;
    
    balance += realizedPnL;
    candleSeries.removePriceLine(t.lineObj); 
    openTrades.splice(idx, 1); 
    
    calculateFloatingPnL(closePx);
    renderTerminal();
    toast(`${t.side} Closed (${reason}) | PnL: ${fmtMoney(realizedPnL)}`, realizedPnL >= 0 ? 'success' : 'error');
  }

  // REVISI 1: ENGINE LAYER UNTUK INTERAKSI GAMBAR (CANVAS DETECTOR)
  function resizeCanvas() {
    const rect = $('chart').getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    redrawCanvas();
  }

  function redrawCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!chart || !candleSeries) return;

    drawings.forEach(d => drawShape(d));
    if (activeDrawing) drawShape(activeDrawing);
  }

  function drawShape(shape) {
    const x1 = chart.timeScale().timeToCoordinate(shape.t1);
    const y1 = candleSeries.priceToCoordinate(shape.p1);
    const x2 = chart.timeScale().timeToCoordinate(shape.t2);
    const y2 = candleSeries.priceToCoordinate(shape.p2);

    if (x1 === null || y1 === null || x2 === null || y2 === null) return;

    ctx.save();
    if (shape.type === 'line') {
      ctx.strokeStyle = '#f5b301'; 
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    } else if (shape.type === 'rect') {
      ctx.strokeStyle = 'rgba(245, 179, 1, 0.75)';
      ctx.fillStyle = 'rgba(245, 179, 1, 0.14)'; 
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.rect(x1, y1, x2 - x1, y2 - y1);
      ctx.fill();
      ctx.stroke();
    }
    ctx.restore();
  }

  function getMouseOrTouchPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function handleStart(e) {
    if (currentTool === 'pointer') return;
    if (!e.touches) e.preventDefault();
    const pos = getMouseOrTouchPos(e);
    const t = chart.timeScale().coordinateToTime(pos.x);
    const p = candleSeries.coordinateToPrice(pos.y);

    if (t && p) {
      isDrawing = true;
      activeDrawing = { type: currentTool, t1: t, p1: p, t2: t, p2: p };
    }
  }

  function handleMove(e) {
    if (!isDrawing || !activeDrawing) return;
    const pos = getMouseOrTouchPos(e);
    const t = chart.timeScale().coordinateToTime(pos.x);
    const p = candleSeries.coordinateToPrice(pos.y);

    if (t && p) {
      activeDrawing.t2 = t;
      activeDrawing.p2 = p;
      redrawCanvas();
    }
  }

  function handleEnd() {
    if (isDrawing && activeDrawing) {
      drawings.push(activeDrawing);
      activeDrawing = null;
      isDrawing = false;
      redrawCanvas();
    }
  }

  // Mouse Listener
  canvas.addEventListener('mousedown', handleStart);
  canvas.addEventListener('mousemove', handleMove);
  canvas.addEventListener('mouseup', handleEnd);

  // Touch Listener (Mobile & Telegram App)
  canvas.addEventListener('touchstart', handleStart, { passive: false });
  canvas.addEventListener('touchmove', handleMove, { passive: false });
  canvas.addEventListener('touchend', handleEnd);

  // Selector Toolbar Drawing
  document.querySelectorAll('#toolSeg button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#toolSeg button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      currentTool = b.dataset.tool;

      if (currentTool === 'pointer') {
        canvas.style.pointerEvents = 'none'; // Berikan kontrol balik ke drag chart asli
      } else {
        canvas.style.pointerEvents = 'auto'; // Kunci layar untuk menggambar zona/garis
      }
    });
  });

  $('clearDrawingsBtn').addEventListener('click', () => {
    drawings = [];
    redrawCanvas();
    toast('Seluruh gambar dibersihkan', 'success');
  });

  // TERMINAL UI
  $('btnTerminal').addEventListener('click', () => {
    renderTerminal();
    $('terminalModal').classList.add('open');
  });

  function renderTerminal() {
    let html = '';
    if (openTrades.length === 0) {
      html = '<tr><td colspan="6" style="text-align:center; padding:15px; color:var(--muted)">Tidak ada posisi terbuka</td></tr>';
    } else {
      openTrades.forEach(t => {
        let pnlColor = t.livePnl >= 0 ? 'pos' : 'neg';
        let slStr = t.sl > 0 ? t.sl : '-';
        let tpStr = t.tp > 0 ? t.tp : '-';
        html += `<tr>
          <td style="color:var(--${t.side==='BUY'?'green':'red'})"><b>${t.side}</b></td>
          <td>${t.lot}</td>
          <td>${t.entry.toFixed(2)}</td>
          <td style="font-size:9px; color:var(--muted)">S:${slStr}<br>T:${tpStr}</td>
          <td class="${pnlColor}"><b>$${t.livePnl.toFixed(2)}</b></td>
          <td><button class="btn-close" onclick="executeCloseTrade(${t.id})">X</button></td>
        </tr>`;
      });
    }
    $('terminalBody').innerHTML = html;
  }

  window.openModal = function(id) { $(id).classList.add('open'); }
  window.closeModal = function(id) { $(id).classList.remove('open'); }

  function updateHUD(c) { $('ohlc').innerHTML = `<span><b>O</b>${c.open.toFixed(2)}</span><span><b>H</b>${c.high.toFixed(2)}</span><span><b>L</b>${c.low.toFixed(2)}</span><span style="color:${c.close>=c.open?'#22c55e':'#ef4444'}"><b style="color:var(--muted)">C</b>${c.close.toFixed(2)}</span>`; }
  function updateProgress() { $('progressLabel').innerText = `Bar ${visibleIdx}/${allCandles.length}`; }
  function fmtMoney(n) { return (n<0?'-':'') + '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
  
  let tTimer; window.toast = function(m, k) { $('toast').textContent=m; $('toast').className='toast show '+k; clearTimeout(tTimer); tTimer=setTimeout(()=>$('toast').className='toast',3000); }

  $('nextBtn').addEventListener('click', nextCandle);
  $('playBtn').addEventListener('click', togglePlay);
  
  document.querySelectorAll('#speedSeg button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#speedSeg button').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); speedMs = parseInt(b.dataset.speed);
      if(playing) { stopPlay(); togglePlay(); }
    });
  });

  document.querySelectorAll('#tfSeg button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#tfSeg button').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); 
      currentTF = b.dataset.tf;
      applyFilters(); 
    });
  });

  function stopPlay() { playing = false; $('playBtn').innerHTML = '▶ Play'; clearInterval(playTimer); }

  fetchHistory();
})();
</script>
</body>
</html>
