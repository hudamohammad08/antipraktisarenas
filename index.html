<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti Praktis Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { margin: 0; background-color: #1c1c1c; color: white; font-family: sans-serif; }
        #tradingview_widget { height: 350px; }
        .panel { padding: 15px; background: #2b2b2b; }
        .btn-container { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-sell { background: #d32f2f; }
        .btn-buy { background: #1976d2; }
        .btn-close { background: #ff9800; display: none; width: 100%; }
        #display-price { font-size: 20px; color: #fb8c00; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="tradingview_widget"></div>

    <div class="panel">
        <h3 id="display-price">Harga: Memuat...</h3>
        <select id="symbol" onchange="loadChart()" style="width: 100%; padding: 10px; background: #1c1c1c; color: white;"></select>
        
        <div class="btn-container" id="trade-ui">
            <button class="btn-sell" onclick="executeTrade('SELL')">SELL</button>
            <button class="btn-buy" onclick="executeTrade('BUY')">BUY</button>
        </div>
        <button id="close-btn" class="btn-close" onclick="closeTrade()">CLOSE POSITION</button>
    </div>

    <script>
        // ========================================================
        // 1. KONFIGURASI ADMIN
        // ========================================================
        const BOT_TOKEN = "8776331759:AAFVup_qefWDme_yz7PYUvzDcXJNlJ70yLU";
        const CHAT_ID = "-1003742641612";

        const ADMIN_CONFIG = {
            allowedSymbols: [
                { name: "XAUUSD (Emas)", value: "FX:XAUUSD" },
                { name: "BTCUSDT (Bitcoin)", value: "BINANCE:BTCUSDT" },
                { name: "ETHUSDT (Ethereum)", value: "BINANCE:ETHUSDT" }
            ],
            gameStartTime: "2026-06-07T00:00:00", 
            gameEndTime: "2026-06-15T23:59:59"
        };
        // ========================================================

        const tg = window.Telegram.WebApp;
        tg.ready();
        const userName = tg.initDataUnsafe?.user?.first_name || "Trader";

        function checkGameStatus() {
            const now = new Date().getTime();
            const start = new Date(ADMIN_CONFIG.gameStartTime).getTime();
            const end = new Date(ADMIN_CONFIG.gameEndTime).getTime();

            if (now < start) { document.body.innerHTML = "<h1>Game Belum Dimulai</h1>"; return false; }
            if (now > end) { document.body.innerHTML = "<h1>Game Sudah Berakhir</h1>"; return false; }
            return true;
        }

        function initApp() {
            if (!checkGameStatus()) return;
            
            const select = document.getElementById('symbol');
            ADMIN_CONFIG.allowedSymbols.forEach(asset => {
                let opt = document.createElement('option');
                opt.value = asset.value; opt.innerHTML = asset.name;
                select.appendChild(opt);
            });
            loadChart();
        }

        let currentPrice = 0;
        let isTrading = false;
        let tradeDir = '';

        function loadChart() {
            const symbol = document.getElementById('symbol').value;
            new TradingView.widget({
                "container_id": "tradingview_widget",
                "symbol": symbol,
                "interval": "1",
                "theme": "dark",
                "width": "100%", "height": "350"
            });
            updatePrice();
        }

        function updatePrice() {
            const sym = document.getElementById('symbol').value.split(':')[1];
            fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`)
                .then(r => r.json()).then(d => {
                    currentPrice = parseFloat(d.price);
                    document.getElementById('display-price').innerText = `Harga ${sym}: $${currentPrice.toFixed(2)}`;
                }).catch(() => {});
            setTimeout(updatePrice, 2000);
        }

        function executeTrade(dir) {
            isTrading = true;
            tradeDir = dir;
            document.getElementById('trade-ui').style.display = 'none';
            document.getElementById('close-btn').style.display = 'block';
            sendToChannel(`🚀 *TRADE OPEN*\n👤 ${userName}\nDir: ${dir}\nPrice: $${currentPrice.toFixed(2)}`);
        }

        function closeTrade() {
            isTrading = false;
            document.getElementById('trade-ui').style.display = 'flex';
            document.getElementById('close-btn').style.display = 'none';
            sendToChannel(`🏁 *TRADE CLOSED*\n👤 ${userName}\nPrice: $${currentPrice.toFixed(2)}`);
        }

        function sendToChannel(msg) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: "Markdown" })
            });
        }

        initApp();
    </script>
</body>
</html>
