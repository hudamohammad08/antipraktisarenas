<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta id="smartViewport" name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StrategyTune - Smart Auto-Fit</title>
<style>
  body, html { 
    margin: 0; padding: 0; 
    width: 100%; height: 100%; 
    background: #0b0f17;
  }
  iframe { 
    width: 100%; height: 100%; 
    border: none; display: block; 
  }
</style>
</head>
<body>

  <iframe src="https://strategytune.com/app" allowfullscreen></iframe>

  <script>
    function adjustComfort() {
      const viewport = document.getElementById('smartViewport');
      const isPortrait = window.innerHeight > window.innerWidth;

      if (isPortrait) {
        // MODE TEGAK (PORTRAIT)
        // Kita tipu webnya menjadi seukuran Tablet (980px)
        // Ini adalah ukuran terkecil di mana panel PNL biasanya masih mau muncul.
        // user-scalable=yes mengizinkan Anda men-zoom layar dengan dua jari.
        viewport.setAttribute('content', 'width=980, user-scalable=yes');
      } else {
        // MODE MENDATAR (LANDSCAPE)
        // Kita tipu webnya menjadi seukuran Laptop (1200px) agar grafik lega.
        viewport.setAttribute('content', 'width=1200, user-scalable=yes');
      }
    }

    // Pantau setiap kali Anda memutar HP
    window.addEventListener('orientationchange', function() {
      // Beri jeda sedikit agar sensor HP selesai memutar layar
      setTimeout(adjustComfort, 300); 
    });
    
    // Jalankan skrip saat aplikasi pertama kali dibuka
    adjustComfort();
  </script>

</body>
</html>
