<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anti Praktis - Backtesting Max</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #131722; --panel: #1e222d; --text: #d1d4dc; --blue: #2962ff; --green: #26a69a; --red: #ef5350; }
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; background: var(--bg); color: white; }
        body { display: flex; flex-direction: column; }

        /* REPLAY CONTROLS */
        .replay-bar { background: var(--panel); padding: 8px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2b2b2b; flex-shrink: 0; }
        .btn-replay { background: var(--blue); color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-replay.pause { background: #ff9800; }
        #sim-time { font-size: 12px; color: #b2b5be; font-family: monospace; }

        /* CHART AREA */
        #chart-box { flex-grow: 1; width: 100%; position: relative; }

        /* TRADING PANEL */
        .trade-panel { background: var(--panel); border-top: 1px solid #2b2b2b; padding: 12px; flex-shrink: 0; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .price-text { color: #ff9800; font-weight: bold; font-size: 15px; }
        .balance-text { color: #2196F3; font-weight: bold; font-size: 15px; }

        .order-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .input-group label { font-size: 10px; color: #b2b5be; display: block; margin-bottom: 3px; text-transform: uppercase; }
        .input-group input { width: 100%; background: var(--bg); border: 1px solid #363c4e; color: white; padding: 8px; border-radius: 4px; text-align: center; box-sizing: border-box; font-size: 14px; }

        .action-btns { display: flex; gap: 10px; margin-bottom: 12px; }
        .btn-action { flex: 1; padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; }
        .sell { background: var(--red); }
        .buy { background: var(--green); }

        /* POSITIONS TABLE */
        .terminal { background: var(--bg); border-radius: 4px; overflow: hidden; border: 1px solid #2b2b2b; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #1c2030; color: #787b86; padding: 6px; text-align: left; }
        td { padding: 8px 6px; border-bottom: 1px solid #232733; }
        .btn-close { background: #ff9800; border: none; padding: 4px 8px; border-radius: 3px; color: white; font-size: 10px; cursor: pointer; }

        /* LOADING & OVERLAY */
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .loading-text { margin-top: 10px; color: var(--text); }
    </style>
</head>
<body>

    <div id="loader">
        <div style="font-size: 30px;">⏳</div>
        <div class="loading-text" id="status-text">Menyiapkan Mesin...</div>
    </div>

    <div class="replay-bar">
        <button class="btn-replay" id="play-btn" onclick="togglePlay()">▶️ PLAY</button>
        <button class="btn-replay" onclick="stepForward()">⏭️ STEP</button>
        <div id="sim-time">--/--/-- --:--</div>
    </div>

    <div id="chart-box"></div>

    <div class="trade-panel">
        <div class="stats-row">
            <div class="price-text" id="live-price">PRICE: $0.00</div>
            <div class="balance-text" id="live-balance">BALANCE: $10,000.00</div>
        </div>

        <div class="order-inputs">
            <div class="input-group">
                <label>Lot Size</label>
                <input type="number" id="lot" value="1.00" step="0.1">
            </div>
            <div class="input-group">
                <label>Stop Loss</label>
                <input type="number" id="sl" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Take Profit</label>
                <input type="number" id="tp" placeholder="0.00">
            </div>
        </div>

        <div class="action-btns">
            <button class="btn-action sell" onclick="placeOrder('SELL')">SELL</button>
            <button class="btn-action buy" onclick="placeOrder('BUY')">BUY</button>
        </div>

        <div class="terminal">
            <table>
                <thead>
                    <tr>
                        <th>TYPE</th>
                        <th>ENTRY</th>
                        <th>PnL ($)</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="pos-body">
                    <tr><td colspan="4" style="text-align:center; padding:10px; color:#787b86;">Belum ada posisi terbuka</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // CONFIG & STATE
        let chart, candleSeries, historicalData = [], currentIndex = 0;
        let isPlaying = false, playInterval;
        let balance = 10000.00, openPositions = [];
        let currentPrice = 0;

        // 1. INISIALISASI GRAFIK
        function initChart() {
            const chartDiv = document.getElementById('chart-box');
            chart = LightweightCharts.createChart(chartDiv, {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#2b2b2b' }, horzLines: { color: '#2b2b2b' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: { timeVisible: true, secondsVisible: false, borderVisible: false }
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
                wickUpColor: '#26a69a', wickDownColor: '#ef5350'
            });

            // Handle Responsive
            window.addEventListener('resize', () => {
                chart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv.clientHeight });
            });
        }

        // 2. MENGAMBIL DATA (DENGAN PROXY ANTI-BLOKIR)
        async function loadHistory() {
            const status = document.getElementById('status-text');
            status.innerText = "Menarik Data Pasar... 🌐";

            // Menggunakan Proxy Binance agar tidak diblokir Kominfo/ISP Indonesia
            const proxyUrl = 'https://api.allorigins.win/get?url=';
            const targetUrl = encodeURIComponent('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=1000');
            
            try {
                const response = await fetch(proxyUrl + targetUrl);
                const json = await response.json();
                const rawData = JSON.parse(json.contents);

                historicalData = rawData.map(d => ({
                    time: d[0] / 1000,
                    open: parseFloat(d[1]),
                    high: parseFloat(d[2]),
                    low: parseFloat(d[3]),
                    close: parseFloat(d[4])
                }));

                // Berikan 100 data awal ke layar
                const startData = historicalData.slice(0, 100);
                candleSeries.setData(startData);
                currentIndex = 100;
                
                document.getElementById('loader').style.display = 'none';
                updateUI();
            } catch (err) {
                status.innerHTML = "<span style='color:#ef5350'>Gagal Terhubung Jaringan ❌<br>Coba gunakan VPN atau matikan DNS Private.</span>";
            }
        }

        // 3. LOGIKA REPLAY (MESIN WAKTU)
        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-btn');
            if (isPlaying) {
                btn.innerText = "⏸️ PAUSE";
                btn.classList.add('pause');
                playInterval = setInterval(stepForward, 800); // Kecepatan Bar
            } else {
                btn.innerText = "▶️ PLAY";
                btn.classList.remove('pause');
                clearInterval(playInterval);
            }
        }

        function stepForward() {
            if (currentIndex < historicalData.length) {
                const bar = historicalData[currentIndex];
                candleSeries.update(bar);
                currentIndex++;
                updateUI();
                checkAutoClose();
            } else {
                if(isPlaying) togglePlay();
                alert("Data Riwayat Habis!");
            }
        }

        // 4. SISTEM TRADING
        function updateUI() {
            const currentBar = historicalData[currentIndex - 1];
            currentPrice = currentBar.close;
            
            document.getElementById('live-price').innerText = `BTC: $${currentPrice.toLocaleString()}`;
            document.getElementById('live-balance').innerText = `BAL: $${balance.toLocaleString()}`;
            
            const d = new Date(currentBar.time * 1000);
            document.getElementById('sim-time').innerText = d.toLocaleString('id-ID', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
            
            renderTerminal();
        }

        function placeOrder(type) {
            const lot = parseFloat(document.getElementById('lot').value) || 1;
            const sl = parseFloat(document.getElementById('sl').value) || 0;
            const tp = parseFloat(document.getElementById('tp').value) || 0;

            const pos = {
                id: Date.now(),
                type: type,
                entry: currentPrice,
                lot: lot,
                sl: sl,
                tp: tp
            };

            openPositions.push(pos);
            renderTerminal();
        }

        function renderTerminal() {
            const body = document.getElementById('pos-body');
            if (openPositions.length === 0) {
                body.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:10px; color:#787b86;">Belum ada posisi terbuka</td></tr>';
                return;
            }

            body.innerHTML = openPositions.map(p => {
                let pnl = p.type === 'BUY' ? (currentPrice - p.entry) : (p.entry - currentPrice);
                let totalPnL = pnl * p.lot;
                let pnlColor = totalPnL >= 0 ? 'var(--green)' : 'var(--red)';

                return `
                    <tr>
                        <td style="color:${p.type === 'BUY' ? 'var(--green)' : 'var(--red)'}">${p.type} ${p.lot}L</td>
                        <td>$${p.entry.toLocaleString()}</td>
                        <td style="color:${pnlColor}; font-weight:bold">$${totalPnL.toFixed(2)}</td>
                        <td><button class="btn-close" onclick="closeOrder(${p.id})">CLOSE</button></td>
                    </tr>
                `;
            }).join('');
        }

        function checkAutoClose() {
            // Logika TP/SL otomatis saat bar berjalan
            for (let i = openPositions.length - 1; i >= 0; i--) {
                const p = openPositions[i];
                if (p.sl > 0) {
                    if ((p.type === 'BUY' && currentPrice <= p.sl) || (p.type === 'SELL' && currentPrice >= p.sl)) {
                        closeOrder(p.id, "SL HIT");
                    }
                }
                if (p.tp > 0) {
                    if ((p.type === 'BUY' && currentPrice >= p.tp) || (p.type === 'SELL' && currentPrice <= p.tp)) {
                        closeOrder(p.id, "TP HIT");
                    }
                }
            }
        }

        function closeOrder(id, reason = "") {
            const idx = openPositions.findIndex(p => p.id === id);
            if (idx === -1) return;

            const p = openPositions[idx];
            let pnl = p.type === 'BUY' ? (currentPrice - p.entry) : (p.entry - currentPrice);
            balance += (pnl * p.lot);
            
            openPositions.splice(idx, 1);
            if(reason) alert(reason + " at $" + currentPrice);
            updateUI();
        }

        // STARTUP
        initChart();
        loadHistory();
    </script>
</body>
</html>
